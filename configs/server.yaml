# update-server configuration.
#
# Paths may be absolute or relative to the process working directory.
# All durations use Go's time.Duration syntax (e.g. "30s", "2m", "1h").

http:
  addr: ":8080"
  read_header_timeout: "5s"
  read_timeout: "30s"
  write_timeout: "60s"
  idle_timeout: "2m"
  shutdown_timeout: "15s"

coap:
  addr: ":5683"                    # UDP plain. DTLS (coaps://) is not enabled.

store:
  binaries_dir: "./store/binaries" # versioned source binaries: {hash}.bin
  deltas_dir: "./store/deltas"     # cached deltas: {from}_{to}.delta.zst

crypto:
  private_key: "./keys/server.key" # Ed25519 PKCS#8 PEM, mode 0600

target:
  version: "1.0.0"                 # human-readable label returned to agents
  binary: "./store/binaries/latest" # update this path (or replace the file)
                                    # to publish a new release; fsnotify picks
                                    # it up, or call POST /admin/reload.

admin:
  # Bearer token required for POST /admin/reload and POST /admin/loglevel.
  # Keep this secret. For CI/CD, inject via environment manipulation of the
  # config file; for production, run the endpoint on a private network.
  token: "change-me-to-a-long-random-string"

logging:
  level: "info"                    # debug | info | warn | error
  format: "text"                   # text | json

manifest:
  chunk_size: 4096                 # bytes per download chunk recommendation
  retry_after: 30                  # seconds, when a delta is still being built
